name: Test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  jest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: TravelCostApp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: TravelCostApp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
