name: Test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  jest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: TravelCostApp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: TravelCostApp/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test
